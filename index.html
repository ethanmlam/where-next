  body {

    background: #0a0a0f;
    color: #e0e0e8;
    overflow-x: hidden;
  }

  header {
    padding: 32px 40px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
  header p { font-size: 14px; color: #888; margin-top: 4px; }

  .controls {
    padding: 16px 40px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .controls label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }

  .controls select { background: #16161f; border: 1px solid #2a2a3a; color: #ccc; padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; }

  .view-tabs { display: flex; gap: 4px; background: #16161f; border-radius: 8px; padding: 2px; }
  .view-tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; color: #888; transition: all 0.15s; border: none; background: none; }
  .view-tab.active { background: #2a2a3a; color: #fff; }
  .view-tab:hover { color: #ccc; }

  #alluvial-container { width: 100%; padding: 20px 20px 20px 40px; overflow-x: auto; }

  #cards-container {
    padding: 20px 40px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px;
  }

  .founder-card {
    background: #14141e; border: 1px solid #222233; border-radius: 12px; padding: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .founder-card:hover { border-color: #3a3a5a; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .founder-card .name { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 8px; }

  .switch-badge {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px;
    border-radius: 8px; background: rgba(85,102,255,0.12); color: #8899ff; margin: 2px 4px 2px 0;
  }
  .switch-badge .arrow { color: #555; }

  .timeline-row { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }

  .role-chip {
    display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px;
    font-size: 12px; color: #ccc; border: 1px solid rgba(255,255,255,0.08); white-space: nowrap;
  }
  .role-chip .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .role-chip .years { color: #666; font-size: 10px; }

  .tooltip {
    position: fixed; background: #1a1a28; border: 1px solid #333; border-radius: 10px;
    padding: 14px 18px; font-size: 13px; pointer-events: none; z-index: 1000;
    max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); display: none; line-height: 1.6;
  }
  .tooltip .tt-name { font-weight: 700; color: #fff; font-size: 15px; margin-bottom: 6px; }
  .tooltip .tt-detail { color: #bbb; font-size: 12px; }
  .tooltip .tt-role { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .tooltip .tt-role-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tooltip .tt-role-company { color: #fff; font-weight: 500; }
  .tooltip .tt-role-title { color: #999; font-size: 11px; }
  .tooltip .tt-role-years { color: #666; font-size: 10px; margin-left: auto; }
  .tooltip .tt-switch-label {
    display: inline-block; background: rgba(251,191,36,0.15); color: #fbbf24;
    padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
    margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tooltip .tt-sector-title {
    font-weight: 700; color: #fff; font-size: 14px; margin-bottom: 8px;
  }
  .tooltip .tt-person-row {
    display: flex; align-items: center; gap: 8px; margin: 4px 0; color: #ccc; font-size: 12px;
  }
  .tooltip .tt-person-company { color: #888; font-size: 11px; }

  .stats-bar {
    padding: 12px 40px; display: flex; gap: 32px; font-size: 13px; color: #666;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .stats-bar .stat-value { color: #fff; font-weight: 600; font-size: 18px; display: block; }
  .stats-bar .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }

  .sector-legend { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 40px 12px; }
  .legend-item {
    display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888;
    cursor: pointer; padding: 3px 8px; border-radius: 6px; transition: background 0.15s;
  }
  .legend-item:hover { background: rgba(255,255,255,0.05); }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .alluvial-path {
    fill: none; stroke-opacity: 0.25; stroke-width: 2;
    transition: stroke-opacity 0.2s, stroke-width 0.2s; cursor: pointer;
  }
  .alluvial-path.sector-switch { stroke-opacity: 0.45; stroke-width: 2.5; }
  .alluvial-path:hover, .alluvial-path.highlight { stroke-opacity: 0.85; stroke-width: 3.5; }
  .alluvial-path.dimmed { stroke-opacity: 0.04; stroke-width: 1.5; }

  .sector-block { cursor: pointer; transition: opacity 0.15s; }
  .sector-block:hover { opacity: 0.2 !important; }

  .view-hidden { display: none !important; }
  .switch-highlight { background: rgba(255,170,0,0.06); border-color: rgba(255,170,0,0.2); }

  .add-person-wrap { position: relative; }
  #add-person {
    background: #16161f; border: 1px solid #2a2a3a; color: #ccc; padding: 6px 10px;
    border-radius: 6px; font-size: 13px; outline: none; width: 180px;
  }
  #add-person:focus { border-color: #4a4a6a; }
  .add-suggestions {
    position: absolute; top: 100%; left: 0; width: 260px; background: #1a1a28;
    border: 1px solid #333; border-radius: 8px; max-height: 200px; overflow-y: auto;
    z-index: 100; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .add-suggestions.show { display: block; }
  .add-suggestion {
    padding: 8px 12px; cursor: pointer; font-size: 12px; color: #ccc;
    display: flex; align-items: center; gap: 8px;
  }
  .add-suggestion:hover { background: rgba(255,255,255,0.06); }
  .add-suggestion .sg-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .add-suggestion .sg-name { color: #fff; font-weight: 500; }
  .add-suggestion .sg-sub { color: #666; font-size: 10px; }

  .restore-btn {
    background: #1e1e2e; border: 1px solid #333; color: #888; padding: 5px 10px;
    border-radius: 6px; font-size: 11px; cursor: pointer;
  }
  .restore-btn:hover { color: #ccc; border-color: #555; }

  .presets-bar {
    padding: 8px 40px 12px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .presets-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .preset-btn {
    background: #16161f; border: 1px solid #2a2a3a; color: #999; padding: 5px 14px;
    border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .preset-btn:hover { background: #22222f; border-color: #4a4a6a; color: #ddd; }
  .preset-btn.active { background: #2a2a4a; border-color: #6366f1; color: #fff; }
  .preset-btn-all {
    background: transparent; border: 1px solid #2a2a3a; color: #666; padding: 5px 14px;
    border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.15s;
  }
  .preset-btn-all:hover { border-color: #4a4a6a; color: #aaa; }
  .preset-btn-all.active { border-color: #6366f1; color: #fff; }

  .tt-remove-btn {
    display: inline-block; margin-top: 8px; padding: 4px 10px; font-size: 11px;
    background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3);
    border-radius: 5px; cursor: pointer; transition: all 0.15s;
  }
  .tt-remove-btn:hover { background: rgba(239,68,68,0.3); color: #fff; }
</style>

</div>

function getSectorColor(s) { return BROAD_COLORS[broadSector(s)] || '#6b7280'; }

function broadSector(s) {
  if (!s) return 'Other';
  const l = s.toLowerCase();
  // AI: anything AI, ML, AI safety, AI infra
  if (l.includes('ai') || l.includes('artificial') || l.includes('machine learning')) return 'AI';
  // Crypto: blockchain, NFTs, crypto exchanges (but NOT crypto VC — that's VC)
  if ((l.includes('crypto') || l.includes('nft') || l.includes('blockchain')) && !l.includes('vc')) return 'Crypto';
  // Defense: defense tech, military (NOT aerospace/space — that's Deep Tech)
  if (l.includes('defense') || l.includes('military') || l.includes('government') || l.includes('policy')) return 'Defense';
  // Social & Media: social networks, dating, media, internet/media, gaming, content, ad tech
  if (l.includes('social') || l.includes('dating') || l.includes('media') || l.includes('internet') || l.includes('gaming') || l.includes('ad tech')) return 'Social & Media';
  // Enterprise: SaaS, enterprise tools, HR, developer tools, video conferencing, workforce
  if (l.includes('enterprise') || l.includes('saas') || l.includes('hr ') || l.includes('workforce') || l.includes('developer tool') || l.includes('video conferenc')) return 'Enterprise';
  // Fintech: payments, fintech, finance (not hedge/VC)
  if (l.includes('fintech') || l.includes('payment') || (l.includes('finance') && !l.includes('hedge'))) return 'Fintech';
  // VC & Finance: VC, hedge funds, investing, crypto VC, startup accelerator
  if (l.includes('vc') || l.includes('venture') || l.includes('hedge') || l.includes('crypto vc') || l.includes('accelerator')) return 'VC & Finance';
  // Deep Tech: biotech, neurotech, clean energy, automotive, aerospace, space, semiconductors, hardware, tunneling, science, smart home
  if (l.includes('biotech') || l.includes('neurotech') || l.includes('neuroscience') || l.includes('energy') || l.includes('automotive') || l.includes('infrastructure') || l.includes('tunneling') || l.includes('longevity') || l.includes('science') || l.includes('academia') || l.includes('aerospace') || l.includes('space') || l.includes('semiconductor') || l.includes('smart home')) return 'Deep Tech';
  // Consumer: consumer tech, consumer products, education, e-commerce, fashion, mobile apps
  if (l.includes('consumer') || l.includes('photo') || l.includes('education') || l.includes('network state') || l.includes('e-commerce') || l.includes('fashion') || l.includes('mobile app')) return 'Consumer';
  // Catch remaining: consulting, law, distribution -> Other
  return 'Other';
}

let currentView = 'alluvial';
let highlightedSector = null;
let highlightedPerson = null;
let switchersOnly = false;
let sectorFilter = 'all';

document.addEventListener('DOMContentLoaded', () => {
  computeStats(); populateFilters(); buildLegend();
  renderAlluvial(); renderCards(); setupEvents();
  document.getElementById('cards-container').classList.add('view-hidden');
});

function getFiltered() {
  let data = [...FOUNDERS_DATA];
  if (switchersOnly) data = data.filter(f => f.sectorSwitches && f.sectorSwitches.length > 0);
  if (sectorFilter !== 'all') data = data.filter(f => f.roles.some(r => broadSector(r.sector) === sectorFilter));
  return data;
}

function computeStats() {
  const founders = getFiltered();
  const switches = founders.reduce((s, f) => s + (f.sectorSwitches?.length || 0), 0);
  const allSectors = new Set();
  founders.forEach(f => f.roles.forEach(r => allSectors.add(broadSector(r.sector))));
  const destCounts = {};
  founders.forEach(f => {
    if (f.roles.length > 0) {
      const bs = broadSector(f.roles[f.roles.length - 1].sector);
      destCounts[bs] = (destCounts[bs] || 0) + 1;
    }
  });
  const hottest = Object.entries(destCounts).sort((a, b) => b[1] - a[1])[0];
  document.getElementById('stats-bar').innerHTML = `
    <div><span class="stat-value">${founders.length}</span><span class="stat-label">Founders</span></div>
    <div><span class="stat-value">${switches}</span><span class="stat-label">Sector switches</span></div>
    <div><span class="stat-value">${allSectors.size}</span><span class="stat-label">Sectors</span></div>
    <div><span class="stat-value" style="color:${BROAD_COLORS[hottest[0]]}">${hottest[0]}</span><span class="stat-label">Hottest destination</span></div>
  `;
}

function populateFilters() {
  const sectors = new Set();
  FOUNDERS_DATA.forEach(f => f.roles.forEach(r => sectors.add(broadSector(r.sector))));
  const sel = document.getElementById('sector-filter');
  [...sectors].sort().forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
}

function buildLegend() {
  const container = document.getElementById('sector-legend');
  container.innerHTML = '';
  const seen = new Set();
  FOUNDERS_DATA.forEach(f => f.roles.forEach(r => seen.add(broadSector(r.sector))));
  Object.entries(BROAD_COLORS).forEach(([sector, color]) => {
    if (!seen.has(sector)) return;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-dot" style="background:${color}"></span>${sector}`;
    item.addEventListener('click', () => {
      if (highlightedSector === sector) { highlightedSector = null; document.querySelectorAll('.legend-item').forEach(i => i.classList.remove('dimmed')); }
      else { highlightedSector = sector; document.querySelectorAll('.legend-item').forEach(i => i.classList.toggle('dimmed', !i.textContent.includes(sector))); }
      updateHighlights();
    });
    container.appendChild(item);
  });
}

function setupEvents() {
  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentView = tab.dataset.view;
      document.getElementById('alluvial-container').classList.toggle('view-hidden', currentView !== 'alluvial');
      document.getElementById('cards-container').classList.toggle('view-hidden', currentView !== 'cards');
    });
  });
  document.getElementById('sector-filter').addEventListener('change', e => { sectorFilter = e.target.value; refresh(); });
  document.getElementById('switchers-only').addEventListener('change', e => { switchersOnly = e.target.checked; refresh(); });
}

function refresh() { computeStats(); renderAlluvial(); renderCards(); }

const tooltip = document.getElementById('tooltip');
let tooltipLocked = false;
let hideTimer = null;

function showTooltip(e, html) {
  clearTimeout(hideTimer);
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.pointerEvents = 'auto';
  moveTooltip(e);
}
function moveTooltip(e) {
  if (tooltipLocked) return;
  let x = e.clientX + 14, y = e.clientY + 14;
  const r = tooltip.getBoundingClientRect();
  if (x + 400 > window.innerWidth) x = e.clientX - r.width - 14;
  if (y + r.height > window.innerHeight) y = e.clientY - r.height - 14;
  tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
}
function hideTooltip() {
  hideTimer = setTimeout(() => {
    if (!tooltipLocked) {
      tooltip.style.display = 'none';
      tooltip.style.pointerEvents = 'none';
    }
  }, 200);
}
tooltip.addEventListener('mouseenter', () => { clearTimeout(hideTimer); tooltipLocked = true; });
tooltip.addEventListener('mouseleave', () => { tooltipLocked = false; hideTooltip(); highlightedPerson = null; updateHighlights(); });

function founderTooltipHTML(founder, highlightEraIdx) {
  let html = `<div class="tt-name">${founder.name}</div><div class="tt-detail">`;
  founder.roles.forEach(r => {
    const color = getSectorColor(r.sector);
    const years = `${r.start || '?'}\u2013${r.end || 'now'}`;
    const isInEra = highlightEraIdx !== undefined && r.start &&
      r.start <= ERAS[highlightEraIdx].range[1] && (r.end || 2026) >= ERAS[highlightEraIdx].range[0];
    const bold = isInEra ? 'font-weight:600;color:#fff' : '';
    html += `<div class="tt-role" style="${bold}">
      <span class="tt-role-dot" style="background:${color}"></span>
      <span><span class="tt-role-company">${r.company}</span> <span class="tt-role-title">${r.role}</span></span>
      <span class="tt-role-years">${years}</span>

  if (founder.sectorSwitches?.length > 0) html += `<div class="tt-switch-label">${founder.sectorSwitches.length} sector switch${founder.sectorSwitches.length > 1 ? 'es' : ''}</div>`;

}

function sectorBlockTooltipHTML(sector, eraIdx, peopleInBlock) {
  const era = ERAS[eraIdx];
  let html = `<div class="tt-sector-title" style="color:${BROAD_COLORS[sector]}">${sector}</div>`;
  html += `<div style="color:#666;font-size:11px;margin-bottom:8px">${era.label} (${era.sub})</div>`;
  html += `<div class="tt-detail">`;
  peopleInBlock.forEach(p => {
    // Find the role active in this era
    const role = p.founder.roles.filter(r => {
      const start = r.start || 1990; const end = r.end || 2026;
      return start <= era.range[1] && end >= era.range[0] && broadSector(r.sector) === sector;
    }).pop();
    const company = role ? role.company : '';
    const title = role ? role.role : '';
    html += `<div class="tt-person-row">
      <span style="color:#fff;font-weight:500">${p.founder.name}</span>
      <span class="tt-person-company">${title}${company ? ' @ ' + company : ''}</span>
    </div>`;
  });
  html += `</div>`;
  return html;
}

// =====================================================
// CONCENTRIC DOT POSITIONS
// =====================================================
function concentricPositions(cx, cy, count, baseRadius) {
  if (count === 0) return [];
  if (count === 1) return [{ x: cx, y: cy }];

  const positions = [];
  // Center dot first
  positions.push({ x: cx, y: cy });
  let placed = 1;
  let ring = 1;

  while (placed < count) {
    const r = baseRadius * ring;
    const circumference = 2 * Math.PI * r;
    const maxInRing = Math.max(6, Math.floor(circumference / (baseRadius * 0.9)));
    const inThisRing = Math.min(maxInRing, count - placed);
    
    for (let i = 0; i < inThisRing; i++) {
      const angle = (2 * Math.PI * i / inThisRing) - Math.PI / 2;
      positions.push({
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle),
      });
      placed++;
    }
    ring++;
  }
  return positions;
}

function renderAlluvial() {
  const svg = document.getElementById('alluvial-svg');
  svg.innerHTML = '';

  const founders = getFiltered();
  if (founders.length === 0) return;

  // For each founder, find their primary broad sector per era + details
  const founderEras = founders.map(f => {
    return ERAS.map(era => {
      const activeRoles = f.roles.filter(r => {
        const start = r.start || 1990; const end = r.end || 2026;
        return start <= era.range[1] && end >= era.range[0];
      });
      if (activeRoles.length === 0) return null;
      const role = activeRoles.reduce((best, r) => (!best || (r.start || 0) > (best.start || 0)) ? r : best, null);
      return { broad: broadSector(role.sector), sector: role.sector, company: role.company, role: role.role };
    });
  });

  // Get consistent sector ordering (biggest sectors first for visual weight)
  const allBroads = new Set();
  founderEras.forEach(fe => fe.forEach(e => { if (e) allBroads.add(e.broad); }));
  const sectorOrder = [...allBroads].sort((a, b) => {
    const cA = founderEras.reduce((s, fe) => s + fe.filter(e => e && e.broad === a).length, 0);
    const cB = founderEras.reduce((s, fe) => s + fe.filter(e => e && e.broad === b).length, 0);
    return cB - cA;
  });

  // Layout — compact columns, leave room for names on right
  const nameColW = 180;
  const W = Math.max(1000, window.innerWidth - 20);
  const vizW = W - nameColW;
  const padX = 60;
  const padTop = 75;
  const numCols = ERAS.length;
  const colSpacing = (vizW - 2 * padX) / (numCols - 1);
  const dotRadius = 5;
  const ringSpacing = 13;

  function clusterRadius(count) {
    if (count <= 1) return dotRadius;
    if (count <= 7) return ringSpacing;
    if (count <= 19) return ringSpacing * 2;
    return ringSpacing * 3;
  }

  // Compute column sector positions
  const colData = ERAS.map((era, colIdx) => {
    const groups = {};
    founderEras.forEach((fe, fi) => {
      if (!fe[colIdx]) return;
      const b = fe[colIdx].broad;
      if (!groups[b]) groups[b] = [];
      groups[b].push({ founderIdx: fi, founder: founders[fi], detail: fe[colIdx] });
    });
    return groups;
  });

  // Place sector clusters vertically per column, keeping same sector order
  const sectorGap = 24;
  const clusterPadding = 16;

  const colPositions = ERAS.map((era, colIdx) => {
    const groups = colData[colIdx];
    let y = padTop;
    const positions = {};

    sectorOrder.forEach(sector => {
      const group = groups[sector];
      if (!group || group.length === 0) return;
      const cr = clusterRadius(group.length);
      const blockH = cr * 2 + clusterPadding;
      const cx = padX + colIdx * colSpacing;
      const cy = y + cr + clusterPadding / 2;

      // Get concentric dot positions
      const dots = concentricPositions(cx, cy, group.length, ringSpacing);

      positions[sector] = {
        cx, cy, radius: cr, blockH,
        y: y,
        people: group,
        dots: dots,
      };

      y += blockH + sectorGap;
    });

    return positions;
  });

  const maxY = Math.max(...colPositions.map(col => {
    const entries = Object.values(col);
    if (entries.length === 0) return padTop;
    const last = entries[entries.length - 1];
    return last.y + last.blockH;
  }));
  let H = maxY + 60;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);

  // Draw era labels
  ERAS.forEach((era, i) => {
    const x = padX + i * colSpacing;
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', x); label.setAttribute('y', 24);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#777'); label.setAttribute('font-size', '13'); label.setAttribute('font-weight', '600');
    label.textContent = era.label;
    svg.appendChild(label);

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('x', x); sub.setAttribute('y', 42);
    sub.setAttribute('text-anchor', 'middle');
    sub.setAttribute('fill', '#444'); sub.setAttribute('font-size', '11');
    sub.textContent = era.sub;
    svg.appendChild(sub);

    // Vertical guide
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x); line.setAttribute('y1', padTop - 10);
    line.setAttribute('x2', x); line.setAttribute('y2', H - 20);
    line.setAttribute('stroke', 'rgba(255,255,255,0.03)'); line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  });

  // Draw sector blocks (rounded rects behind clusters) + sector labels
  ERAS.forEach((era, colIdx) => {
    const positions = colPositions[colIdx];
    Object.entries(positions).forEach(([sector, pos]) => {
      const color = BROAD_COLORS[sector] || '#4b5563';
      const r = pos.radius + 10;

      // Background circle/pill for the cluster
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', pos.cx - r);
      rect.setAttribute('y', pos.cy - r);
      rect.setAttribute('width', r * 2);
      rect.setAttribute('height', r * 2);
      rect.setAttribute('rx', r);
      rect.setAttribute('fill', color);
      rect.setAttribute('opacity', '0.07');
      rect.setAttribute('class', 'sector-block');
      rect.setAttribute('data-sector', sector);
      rect.setAttribute('data-era', colIdx);

      // Hover: show all people in this sector/era
      rect.addEventListener('mouseenter', (e) => {
        showTooltip(e, sectorBlockTooltipHTML(sector, colIdx, pos.people));
      });
      rect.addEventListener('mousemove', moveTooltip);
      rect.addEventListener('mouseleave', hideTooltip);

      svg.appendChild(rect);

      // Sector label below the cluster
      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', pos.cx);
      label.setAttribute('y', pos.cy + r + 14);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('fill', color);
      label.setAttribute('font-size', '10');
      label.setAttribute('opacity', '0.6');
      label.textContent = `${sector} (${pos.people.length})`;
      svg.appendChild(label);
    });
  });

  // Build a lookup: founderIdx -> { eraIdx -> dotPosition }
  const founderDotPos = {};
  ERAS.forEach((era, colIdx) => {
    const positions = colPositions[colIdx];
    Object.entries(positions).forEach(([sector, pos]) => {
      pos.people.forEach((p, i) => {
        if (!founderDotPos[p.founderIdx]) founderDotPos[p.founderIdx] = {};
        founderDotPos[p.founderIdx][colIdx] = pos.dots[i];
      });
    });
  });

  // Draw flow paths
  founders.forEach((founder, fi) => {
    const fe = founderEras[fi];
    const dotPos = founderDotPos[fi];
    if (!dotPos) return;

    for (let i = 0; i < ERAS.length - 1; i++) {
      if (!dotPos[i] || !dotPos[i + 1]) continue;
      if (!fe[i] || !fe[i + 1]) continue;

      const x1 = dotPos[i].x;
      const y1 = dotPos[i].y;
      const x2 = dotPos[i + 1].x;
      const y2 = dotPos[i + 1].y;

      const isSectorSwitch = fe[i].broad !== fe[i + 1].broad;
      const color = BROAD_COLORS[fe[i + 1].broad] || '#6b7280';

      const dx = x2 - x1;
      const cx1 = x1 + dx * 0.35;
      const cx2 = x1 + dx * 0.65;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`);
      path.setAttribute('stroke', color);
      path.setAttribute('class', 'alluvial-path' + (isSectorSwitch ? ' sector-switch' : ''));
      path.setAttribute('data-founder', founder.id);
      path.setAttribute('data-from-sector', fe[i].broad);
      path.setAttribute('data-to-sector', fe[i + 1].broad);

      path.addEventListener('mouseenter', (e) => {
        highlightedPerson = founder.id;
        updateHighlights();
        showTooltip(e, founderTooltipHTML(founder, i + 1));
      });
      path.addEventListener('mousemove', moveTooltip);
      path.addEventListener('mouseleave', () => { highlightedPerson = null; updateHighlights(); hideTooltip(); });

      svg.appendChild(path);
    }
  });

  // Draw dots (concentric within clusters)
  founders.forEach((founder, fi) => {
    const fe = founderEras[fi];
    const dotPos = founderDotPos[fi];
    if (!dotPos) return;

    ERAS.forEach((era, colIdx) => {
      if (!fe[colIdx] || !dotPos[colIdx]) return;
      const { x, y } = dotPos[colIdx];
      const color = BROAD_COLORS[fe[colIdx].broad] || '#6b7280';

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', x); circle.setAttribute('cy', y);
      circle.setAttribute('r', dotRadius);
      circle.setAttribute('fill', color);
      circle.setAttribute('stroke', '#0a0a0f');
      circle.setAttribute('stroke-width', '2');
      circle.setAttribute('data-founder', founder.id);
      circle.style.cursor = 'pointer';
      circle.style.transition = 'r 0.15s, stroke 0.15s';

      circle.addEventListener('mouseenter', (e) => {
        circle.setAttribute('r', dotRadius + 2);
        circle.setAttribute('stroke', '#fff');
        highlightedPerson = founder.id;
        updateHighlights();
        showTooltip(e, founderTooltipHTML(founder, colIdx));
      });
      circle.addEventListener('mousemove', moveTooltip);
      circle.addEventListener('mouseleave', () => {
        circle.setAttribute('r', dotRadius);
        circle.setAttribute('stroke', '#0a0a0f');
        highlightedPerson = null;
        updateHighlights();
        hideTooltip();
      });

      svg.appendChild(circle);
    });
  });

  // Names on right side — grouped by primarySector (what they're MOST known for)
  const nameX = vizW + 8;
  const primaryGroups = {};
  founders.forEach((founder, fi) => {
    const dotPos = founderDotPos[fi];
    if (!dotPos) return;
    let lastEra = -1;
    ERAS.forEach((_, i) => { if (dotPos[i]) lastEra = i; });
    if (lastEra < 0) return;
    // Use primarySector if set, otherwise fall back to last era's broad sector
    const sector = founder.primarySector || founderEras[fi][lastEra].broad;
    if (!primaryGroups[sector]) primaryGroups[sector] = [];
    primaryGroups[sector].push({ founder, fi, y: dotPos[lastEra].y });
  });

  // Sort within each group, then lay out names sequentially to avoid overlap
  Object.values(primaryGroups).forEach(group => group.sort((a, b) => a.y - b.y));
  const allNames = [];
  sectorOrder.forEach(s => { if (primaryGroups[s]) allNames.push(...primaryGroups[s]); });
  // Also catch any sectors not in sectorOrder
  Object.keys(primaryGroups).forEach(s => { if (!sectorOrder.includes(s) && primaryGroups[s]) allNames.push(...primaryGroups[s]); });

  // Stack names continuously from the top, ignore dot Y positions
  // Group by primarySector for visual grouping, add small gap between groups
  const groupedNames = [];
  let currentSector = null;
  // Dynamic name sizing: scale font + spacing based on how many founders are showing
  const n = allNames.length;
  let nameFontSize, nameSpacing;
  if (n <= 20)      { nameFontSize = 13; nameSpacing = 18; }
  else if (n <= 35)  { nameFontSize = 11; nameSpacing = 15; }
  else if (n <= 50)  { nameFontSize = 10; nameSpacing = 13; }
  else if (n <= 70)  { nameFontSize = 9;  nameSpacing = 11; }
  else               { nameFontSize = 8;  nameSpacing = 10; }

  let nameY = padTop;
  allNames.forEach(item => {
    const ps = item.founder.primarySector || 'Other';
    if (currentSector !== null && currentSector !== ps) {
      nameY += 4; // small gap between sector groups
    }
    currentSector = ps;
    item.nameY = nameY;
    nameY += nameSpacing;
  });

  // Extend SVG if names need more room
  const namesBottom = nameY + 20;
  if (namesBottom > H) {
    H = namesBottom;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('height', H);
  }

  allNames.forEach(({ founder, fi, nameY }) => {
    const primaryColor = BROAD_COLORS[founder.primarySector] || '#777';

    // X button before name
    const xBtn = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    xBtn.setAttribute('x', nameX - 2);
    xBtn.setAttribute('y', nameY + 4);
    xBtn.setAttribute('text-anchor', 'end');
    xBtn.setAttribute('fill', '#444');
    xBtn.setAttribute('font-size', nameFontSize);
    xBtn.style.cursor = 'pointer';
    xBtn.textContent = '\u00d7';
    xBtn.addEventListener('mouseenter', () => xBtn.setAttribute('fill', '#f87171'));
    xBtn.addEventListener('mouseleave', () => xBtn.setAttribute('fill', '#444'));
    xBtn.addEventListener('click', (e) => { e.stopPropagation(); removePerson(founder.id); });
    svg.appendChild(xBtn);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', nameX + 4);
    text.setAttribute('y', nameY + 4);
    text.setAttribute('fill', primaryColor);
    text.setAttribute('font-size', nameFontSize);
    text.setAttribute('opacity', '0.7');
    text.setAttribute('data-founder', founder.id);
    text.style.cursor = 'pointer';
    text.style.transition = 'fill 0.15s, opacity 0.15s';
    text.textContent = founder.name;

    text.addEventListener('mouseenter', (e) => {
      text.setAttribute('fill', '#fff');
      text.setAttribute('opacity', '1');
      highlightedPerson = founder.id;
      updateHighlights();
      showTooltip(e, founderTooltipHTML(founder));
    });
    text.addEventListener('mousemove', moveTooltip);
    text.addEventListener('mouseleave', () => {
      text.setAttribute('fill', primaryColor);
      text.setAttribute('opacity', '0.7');
      highlightedPerson = null;
      updateHighlights();
      hideTooltip();
    });

    svg.appendChild(text);
  });
}

function updateHighlights() {
  document.querySelectorAll('.alluvial-path').forEach(path => {
    const fid = path.getAttribute('data-founder');
    const fromS = path.getAttribute('data-from-sector');
    const toS = path.getAttribute('data-to-sector');
    if (highlightedPerson) {
      path.classList.toggle('highlight', fid === highlightedPerson);
      path.classList.toggle('dimmed', fid !== highlightedPerson);
    } else if (highlightedSector) {
      const m = fromS === highlightedSector || toS === highlightedSector;
      path.classList.toggle('highlight', m);
      path.classList.toggle('dimmed', !m);
    } else { path.classList.remove('highlight', 'dimmed'); }
  });
  document.querySelectorAll('circle[data-founder], text[data-founder]').forEach(el => {
    const fid = el.getAttribute('data-founder');
    if (highlightedPerson) { el.style.opacity = fid === highlightedPerson ? '1' : '0.15'; }
    else { el.style.opacity = '1'; }
  });
}

function renderCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  const sorted = [...getFiltered()].sort((a, b) => (b.sectorSwitches?.length || 0) - (a.sectorSwitches?.length || 0));
  sorted.forEach(f => {
    const card = document.createElement('div');
    card.className = 'founder-card' + (f.sectorSwitches?.length > 0 ? ' switch-highlight' : '');
    const switches = (f.sectorSwitches || []).map(s =>
      `<span class="switch-badge">${s.from} <span class="arrow">\u2192</span> ${s.to} <span style="color:#555">(${s.year})</span></span>`
    ).join('');
    const roles = f.roles.map(r => {
      const color = getSectorColor(r.sector);
      return `<div class="role-chip" style="border-color:${color}33">
        <span class="dot" style="background:${color}"></span>
        <span>${r.company}</span>
        <span style="color:#888;font-size:10px">${r.role}</span>
        <span class="years">${r.start || '?'}\u2013${r.end || 'now'}</span>
      </div>`;
    }).join('');
    card.innerHTML = `
      <div class="name">${f.name} ${f.sectorSwitches?.length > 0 ? `<span style="color:#fbbf24;font-size:12px;font-weight:400">${f.sectorSwitches.length} switch${f.sectorSwitches.length > 1 ? 'es' : ''}</span>` : ''}</div>
      ${switches ? `<div style="margin-bottom:8px">${switches}</div>` : ''}
      <div class="timeline-row">${roles}</div>
    `;
    container.appendChild(card);
  });
}

function applyRemovals() {
  FOUNDERS_DATA.length = 0;
  ALL_FOUNDERS.forEach(f => {
    if (!removedIds.includes(f.id)) FOUNDERS_DATA.push(f);
  });
}

function removePerson(id) {
  if (!removedIds.includes(id)) {
    removedIds.push(id);
    localStorage.setItem('wn-removed', JSON.stringify(removedIds));
  }
  applyRemovals();
  refresh();
  updateRestoreBtn();
}

function restoreAll() {
  removedIds = [];
  localStorage.setItem('wn-removed', '[]');
  applyRemovals();
  refresh();
  updateRestoreBtn();
}

function updateRestoreBtn() {
  const btn = document.getElementById('restore-all');
  if (removedIds.length > 0) {
    btn.style.display = 'inline-block';
    btn.textContent = `Restore ${removedIds.length} removed`;
  } else {
    btn.style.display = 'none';
  }
}

function loadPreset(name) {
  if (!PRESETS[name]) return;
  const preset = PRESETS[name];

  // Clear everything first
  removedIds = ALL_FOUNDERS.map(f => f.id);

  // For each person in preset: ensure they exist in ALL_FOUNDERS, then un-remove them
  preset.forEach(p => {
    if (!ALL_FOUNDERS.find(f => f.id === p.id)) {
      // New person not in main dataset -- add them
      const entry = p.roles ? p : null;
      if (entry) {
        entry.verified = entry.verified || '2026-03-18';
        ALL_FOUNDERS.push(entry);
      }
    }
    removedIds = removedIds.filter(r => r !== p.id);
  });

  localStorage.setItem('wn-removed', JSON.stringify(removedIds));
  applyRemovals();
  refresh();
  updateRestoreBtn();
}

function clearAll() {
  removedIds = ALL_FOUNDERS.map(f => f.id);
  localStorage.setItem('wn-removed', JSON.stringify(removedIds));
  applyRemovals();
  refresh();
  updateRestoreBtn();
}

// Add person search — searches Wikipedia for anyone
const addInput = document.getElementById('add-person');
const suggestions = document.getElementById('add-suggestions');
let searchTimeout = null;
let suggestionsOpen = false;

addInput.addEventListener('input', () => {
  const q = addInput.value.trim();
  if (q.length < 2) { suggestions.classList.remove('show'); suggestionsOpen = false; return; }

  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    const ql = q.toLowerCase();
    // Founders currently on chart that match
    const onChart = getFiltered().filter(f => f.name.toLowerCase().includes(ql));
    // Founders removed from chart that match
    const removed = ALL_FOUNDERS.filter(f => f.name.toLowerCase().includes(ql) && removedIds.includes(f.id));

    let html = '';

    // Show removed founders (can restore)
    if (removed.length > 0) {
      html += removed.slice(0, 3).map(f => {
        const color = BROAD_COLORS[f.primarySector] || '#6b7280';
        return `<div class="add-suggestion" data-restore="${f.id}">
          <span class="sg-dot" style="background:${color}"></span>
          <span><span class="sg-name">${f.name}</span> <span class="sg-sub">removed \u2014 click to restore</span></span>
        </div>`;
      }).join('');
    }

    // Show on-chart matches (for quick find/highlight)
    if (onChart.length > 0) {
      html += onChart.slice(0, 5).map(f => {
        const color = BROAD_COLORS[f.primarySector] || '#6b7280';
        return `<div class="add-suggestion" data-highlight="${f.id}">
          <span class="sg-dot" style="background:${color}"></span>
          <span><span class="sg-name">${f.name}</span> <span class="sg-sub">on chart</span></span>
        </div>`;
      }).join('');
    }

    // Search Supabase for founders not in local data at all
    if (sb) {
      try {
        const { data: dbFounders } = await sb.from('founders').select('id, name, primary_sector, source_url').ilike('name', `%${q}%`).limit(10);
        if (dbFounders) {
          const newFromDb = dbFounders.filter(r => !ALL_FOUNDERS.some(f => f.id === r.id));
          if (newFromDb.length > 0) {
            html += `<div style="padding:4px 12px;color:#555;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">From database</div>`;
            html += newFromDb.slice(0, 5).map(r => {
              const color = BROAD_COLORS[r.primary_sector] || '#6b7280';
              return `<div class="add-suggestion" data-db-id="${r.id}" data-db-name="${r.name}" data-db-sector="${r.primary_sector}">
                <span class="sg-dot" style="background:${color}"></span>
                <span><span class="sg-name">${r.name}</span> <span class="sg-sub">${r.primary_sector}</span></span>
              </div>`;
            }).join('');
          }
        }
      } catch(e) { console.error('DB search:', e); }
    }

    // Wikipedia search for anyone not already found
    const allFoundNames = new Set([
      ...onChart.map(f => f.name.toLowerCase()),
      ...removed.map(f => f.name.toLowerCase())
    ]);
    try {
      const resp = await fetch(`/dashboard/api/where-next/search?q=${encodeURIComponent(q)}`);
      const wdata = await resp.json();
      const wikiResults = (wdata.results || []).filter(r =>
        r.name && r.name.length > 2 && !allFoundNames.has(r.name.toLowerCase())
      );
      if (wikiResults.length > 0) {
        html += `<div style="padding:4px 12px;color:#555;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">Add from Wikipedia</div>`;
        html += wikiResults.slice(0, 5).map(r => {
          const displayName = r.name.split('(')[0].trim();
          const qualifier = r.name.includes('(') ? r.name.match(/\(([^)]+)\)/)?.[1] || '' : '';
          return `<div class="add-suggestion" data-wiki-name="${r.name}" data-wiki-title="${r.name}" data-wiki-url="${r.url || ''}">
            <span class="sg-dot" style="background:#555"></span>
            <span><span class="sg-name">${displayName}</span> <span class="sg-sub">${qualifier || (r.description || '').slice(0,60)}</span></span>
          </div>`;
        }).join('');
      }
    } catch(e) { /* wiki search failed */ }

    if (!html) html = `<div class="add-suggestion"><span class="sg-sub">No results for "${q}"</span></div>`;

    suggestions.innerHTML = html;
    suggestions.classList.add('show');
    suggestionsOpen = true;

    // Restore handlers
    suggestions.querySelectorAll('[data-restore]').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        removedIds = removedIds.filter(r => r !== el.dataset.restore);
        localStorage.setItem('wn-removed', JSON.stringify(removedIds));
        applyRemovals(); refresh(); updateRestoreBtn(); updatePresetBtns();
        addInput.value = ''; suggestions.classList.remove('show'); suggestionsOpen = false;
      });
    });

    // Highlight on-chart founder
    suggestions.querySelectorAll('[data-highlight]').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const fid = el.dataset.highlight;
        // Flash the name on the chart
        document.querySelectorAll(`[data-founder="${fid}"]`).forEach(t => {
          t.setAttribute('opacity', '1');
          t.setAttribute('font-weight', 'bold');
          setTimeout(() => { t.setAttribute('opacity', '0.7'); t.setAttribute('font-weight', 'normal'); }, 2000);
        });
        addInput.value = ''; suggestions.classList.remove('show'); suggestionsOpen = false;
      });
    });

    // Add from Supabase DB
    suggestions.querySelectorAll('[data-db-id]').forEach(el => {
      el.addEventListener('mousedown', async (e) => {
        e.preventDefault();
        const fid = el.dataset.dbId;
        el.querySelector('.sg-sub').textContent = 'loading...';
        try {
          const { data: roles } = await sb.from('roles').select('*').eq('founder_id', fid).order('sort_order');
          const { data: switches } = await sb.from('sector_switches').select('*').eq('founder_id', fid);
          const newFounder = {
            name: el.dataset.dbName,
            id: fid,
            primarySector: el.dataset.dbSector,
            roles: (roles || []).map(r => ({
              company: r.company, role: r.role, sector: r.sector,
              start: r.start_year, end: r.end_year, note: r.note
            })),
            sectorSwitches: (switches || []).map(s => ({
              from: s.from_sector, to: s.to_sector, year: s.year
            }))
          };
          ALL_FOUNDERS.push(newFounder);
          FOUNDERS_DATA.push(newFounder);
          refresh();
        } catch(e) { console.error('Failed to load founder:', e); }
        addInput.value = ''; suggestions.classList.remove('show'); suggestionsOpen = false;
      });
    });

    // Add from Wikipedia — fetch career data then add to chart
    suggestions.querySelectorAll('[data-wiki-name]').forEach(el => {
      el.addEventListener('mousedown', async (e) => {
        e.preventDefault();
        const name = el.dataset.wikiName;
        const wikiTitle = el.dataset.wikiTitle || name;
        const id = name.split('(')[0].trim().toLowerCase().replace(/[^a-z0-9]+/g, '-');
        if (ALL_FOUNDERS.some(f => f.id === id)) return;
        el.querySelector('.sg-sub').textContent = 'loading career...';
        try {
          const resp = await fetch(`/dashboard/api/where-next/wiki-career?title=${encodeURIComponent(wikiTitle)}`);
          const data = await resp.json();
          if (data.name) {
            const newFounder = {
              name: data.name,
              id: data.id || id,
              source: data.source,
              roles: data.roles || [],
              sectorSwitches: data.sectorSwitches || [],
              primarySector: data.primarySector || 'Other',
            };
            ALL_FOUNDERS.push(newFounder);
            FOUNDERS_DATA.push(newFounder);
            refresh();
          }
        } catch(err) {
          console.error('Wiki career fetch failed:', err);
        }
        addInput.value = ''; suggestions.classList.remove('show'); suggestionsOpen = false;
      });
    });
  }, 300);
});

addInput.addEventListener('blur', () => {
  // Delay to allow mousedown on suggestions to fire first
  setTimeout(() => { if (suggestionsOpen) { suggestions.classList.remove('show'); suggestionsOpen = false; } }, 250);
});

// Preset buttons
const presetsBar = document.getElementById('presets-bar');
let activePreset = null;

// "All" button
const allBtn = document.createElement('button');
allBtn.className = 'preset-btn-all active';
allBtn.textContent = `All (${ALL_FOUNDERS.length})`;
allBtn.addEventListener('click', () => {
  activePreset = null;
  restoreAll();
  updatePresetBtns();
});
presetsBar.appendChild(allBtn);

Object.entries(PRESETS).forEach(([name, people]) => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = name;
  btn.dataset.preset = name;
  btn.addEventListener('click', () => {
    if (activePreset === name) {
      // Toggle off — restore all
      activePreset = null;
      restoreAll();
    } else {
      activePreset = name;
      loadPreset(name);
    }
    updatePresetBtns();
  });
  presetsBar.appendChild(btn);
});

function updatePresetBtns() {
  allBtn.textContent = `All (${ALL_FOUNDERS.length})`;
  allBtn.classList.toggle('active', activePreset === null);
  presetsBar.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === activePreset);
  });
}

// Restore all
document.getElementById('restore-all').addEventListener('click', () => {
  activePreset = null;
  restoreAll();
  updatePresetBtns();
});
applyRemovals();
updateRestoreBtn();
</script>
</body>
</html>
